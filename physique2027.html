<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PHYSIQUE 2027 — Training Log</title>
<style>
  :root{
    --bg:#0a0c0e; --bg2:#0e1216; --card:#14191e; --card2:#1a2127; --line:#222b32;
    --txt:#e7edf1; --mut:#7f8b94; --mut2:#566069;
    --cyan:#29d3e0; --cyan-dim:#0e3b40; --gold:#f3b34a; --gold-dim:#3a2d12; --red:#e0564a;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(1200px 600px at 50% -10%, #11181d 0%, transparent 60%), var(--bg);
    color:var(--txt);
    font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    line-height:1.5;min-height:100vh;padding-bottom:150px;
  }
  .num{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}

  header{padding:18px 0 6px}
  .eyebrow{font-size:11px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;font-weight:700}
  .title{font-size:20px;font-weight:800;letter-spacing:.04em;margin:2px 0 0}
  .title b{color:var(--cyan)}
  .countdown{display:flex;align-items:baseline;gap:10px;margin-top:12px;
    background:linear-gradient(180deg,var(--card) 0%,var(--bg2) 100%);
    border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .countdown .big{font-size:40px;font-weight:800;color:var(--cyan);letter-spacing:-.02em}
  .countdown .lab{font-size:11px;color:var(--mut);letter-spacing:.18em;text-transform:uppercase}
  .countdown .phase{margin-left:auto;text-align:right}
  .chip{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.05em;padding:6px 12px;border-radius:999px;
    border:1px solid var(--cyan-dim);background:rgba(41,211,224,.08);color:var(--cyan);cursor:pointer;user-select:none}
  .chip small{display:block;font-size:9px;letter-spacing:.18em;color:var(--mut);text-transform:uppercase;font-weight:700;margin-bottom:2px}

  .eyebrow-row{margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .eyebrow-row .ln{flex:1;height:1px;background:var(--line)}
  .days{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .day{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--mut);
    border-radius:11px;padding:11px 4px;font-weight:800;font-size:13px;letter-spacing:.03em;cursor:pointer;transition:.12s}
  .day small{display:block;font-size:9px;font-weight:700;color:var(--mut2);letter-spacing:.1em;margin-top:3px}
  .day:active{transform:scale(.96)}
  .day.on{background:var(--cyan);color:#04181a;border-color:var(--cyan)}
  .day.on small{color:#063b40}
  .day.leg.on{background:var(--gold);color:#1c1304;border-color:var(--gold)}
  .day.leg.on small{color:#3a2a08}

  .sessbar{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
  .sessbar h2{font-size:16px;font-weight:800;margin:0;letter-spacing:.02em}
  .sessbar input[type=date]{margin-left:auto;background:var(--card);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:7px 9px;font-size:13px;font-family:inherit}

  .metacard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px;margin-bottom:14px}
  .metacard label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700;margin-bottom:5px}
  .metacard .fld{margin-bottom:11px}
  .mrow{display:flex;gap:10px}
  .mrow .fld{flex:1}
  .metacard input,.metacard select,.metacard textarea{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:11px;font-size:15px;font-family:inherit}
  .metacard input:focus,.metacard select:focus,.metacard textarea:focus{outline:none;border-color:var(--cyan)}
  .metacard select{appearance:none;-webkit-appearance:none;padding-right:30px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none' stroke='%237f8b94' stroke-width='1.6'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .metacard textarea{resize:vertical;min-height:58px;line-height:1.5}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 13px 9px;margin-bottom:11px;position:relative;overflow:hidden}
  .ex.big3{border-color:var(--gold-dim)}
  .ex.big3::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .selrow{display:flex;gap:8px;align-items:center;margin-bottom:7px}
  .ex.big3 .selrow{padding-left:5px}
  .exsel{flex:1;min-width:0;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;
    padding:11px 30px 11px 11px;font-size:15px;font-weight:700;font-family:inherit;appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none' stroke='%237f8b94' stroke-width='1.6'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .exsel:focus{outline:none;border-color:var(--cyan)}
  .exdel{background:none;border:1px solid var(--line);color:var(--mut2);border-radius:9px;
    width:38px;height:42px;font-size:16px;cursor:pointer;flex:0 0 auto}
  .exdel:active{border-color:var(--red);color:var(--red)}
  .excustom{width:100%;margin-bottom:8px;background:var(--bg2);border:1px solid var(--cyan-dim);color:var(--txt);
    border-radius:9px;padding:11px;font-size:15px;font-family:inherit}
  .excustom:focus{outline:none;border-color:var(--cyan)}
  .mgsel{width:100%;margin-bottom:8px;background:var(--bg2);border:1px solid var(--line);color:var(--mut);border-radius:9px;
    padding:10px 30px 10px 11px;font-size:13px;font-family:inherit;appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' fill='none' stroke='%237f8b94' stroke-width='1.6'><path d='M1 1l4 4 4-4'/></svg>");
    background-repeat:no-repeat;background-position:right 11px center}
  .mgsel:focus{outline:none;border-color:var(--cyan)}
  .meta{font-size:11.5px;color:var(--mut);margin-bottom:9px;display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center}
  .ex.big3 .meta{padding-left:5px}
  .tag{font-size:10px;font-weight:800;letter-spacing:.06em;padding:3px 7px;border-radius:6px;white-space:nowrap}
  .tag.t-target{background:rgba(41,211,224,.1);color:var(--cyan)}
  .tag.t-str{background:var(--gold-dim);color:var(--gold)}
  .meta .pr{color:var(--gold);font-weight:700}
  .meta .prev .num{color:var(--txt)}

  table.sets{width:100%;border-collapse:collapse}
  table.sets th{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut2);font-weight:700;text-align:left;padding:0 0 4px}
  table.sets td{padding:3px 0}
  .setno{width:30px;color:var(--mut);font-weight:800;font-size:13px}
  .ex.big3 .setno{padding-left:5px}
  .sets input{width:100%;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;
    padding:11px 8px;font-size:16px;text-align:center;font-family:ui-monospace,monospace;font-variant-numeric:tabular-nums}
  .sets input:focus{outline:none;border-color:var(--cyan);background:#0c141a}
  .xcell{width:14px;color:var(--mut2);text-align:center;font-size:13px}
  .rm{width:30px}
  .rm button{background:none;border:none;color:var(--mut2);font-size:19px;line-height:1;cursor:pointer;padding:4px}
  .addset{margin-top:7px;width:100%;background:transparent;border:1px dashed var(--line);color:var(--mut);
    border-radius:9px;padding:9px;font-weight:700;font-size:12.5px;cursor:pointer;letter-spacing:.04em}
  .addset:active{border-color:var(--cyan);color:var(--cyan)}
  .addex{width:100%;background:rgba(41,211,224,.06);border:1px solid var(--cyan-dim);color:var(--cyan);
    border-radius:11px;padding:13px;font-weight:800;font-size:13.5px;cursor:pointer;letter-spacing:.04em;margin-top:4px}
  .addex:active{transform:translateY(1px)}
  .ordno{flex:0 0 auto;width:20px;height:42px;display:flex;align-items:center;justify-content:center;color:var(--mut2);font-weight:800;font-size:13px;font-family:ui-monospace,monospace}
  .ex.big3 .ordno{color:var(--gold)}
  .exbtns{display:flex;gap:5px;flex:0 0 auto}
  .exbtns button{background:none;border:1px solid var(--line);color:var(--mut2);border-radius:8px;width:34px;height:42px;font-size:14px;cursor:pointer;padding:0}
  .exbtns button:active{border-color:var(--cyan);color:var(--cyan)}
  .exbtns .del:active{border-color:var(--red);color:var(--red)}
  .exbtns button[disabled]{opacity:.3}
  .editban{background:var(--gold-dim);color:var(--gold);font-size:12.5px;font-weight:700;border-radius:10px;padding:11px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .editban button{margin-left:auto;background:none;border:1px solid var(--gold);color:var(--gold);border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer}
  .chips{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
  .fchip{background:var(--card);border:1px solid var(--line);color:var(--mut);border-radius:999px;padding:7px 16px;font-size:12.5px;font-weight:700;cursor:pointer}
  .fchip.on{background:var(--cyan);color:#04181a;border-color:var(--cyan)}
  .mhdr{font-size:12px;font-weight:800;color:var(--mut);letter-spacing:.05em;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
  .mhdr .ln{flex:1;height:1px;background:var(--line)}
  .mhdr .ct{color:var(--mut2);font-weight:700;font-size:11px}
  .hactions{display:flex;gap:8px;margin-top:6px}
  .hbtn{flex:1;background:none;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px;font-size:12.5px;font-weight:700;cursor:pointer}
  .hbtn:active{border-color:var(--cyan);color:var(--cyan)}
  .hbtn.del{color:var(--mut2)}
  .hbtn.del:active{border-color:var(--red);color:var(--red)}
  .loadhint{background:rgba(41,211,224,.07);border:1px solid var(--cyan-dim);border-radius:9px;padding:8px 10px;margin-bottom:9px;font-size:12px;color:var(--cyan);font-family:ui-monospace,monospace;line-height:1.6}
  .loadhint b{color:var(--txt);font-weight:800}
  .loadhint span{color:var(--mut2);font-family:inherit;font-size:11px}
  .ex.big3 .loadhint{margin-left:5px}
  .b3box{background:rgba(243,179,74,.06);border:1px solid var(--gold-dim);border-radius:9px;padding:7px 10px;margin:0 0 9px 5px}
  .b3row{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:13px}
  .b3lab{width:62px;flex:0 0 auto;font-weight:800;color:var(--gold);font-size:11.5px}
  .b3sr{flex:1;color:var(--txt);font-family:ui-monospace,monospace;font-weight:700}
  .b3kg{flex:0 0 auto;color:var(--gold);font-weight:800;font-family:ui-monospace,monospace}
  .b3note{font-size:10.5px;color:var(--mut2);margin-top:3px}
  .b3phase{font-size:10px;font-weight:800;letter-spacing:.1em;color:var(--mut2);text-transform:uppercase;margin-bottom:4px}
  .bcard .b1rm{margin-top:8px;padding-top:8px;border-top:1px solid var(--gold-dim);font-size:11px;color:var(--mut);font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px}
  .bcard .ormin{width:48px;background:var(--bg2);border:1px solid var(--line);color:var(--gold);border-radius:7px;padding:5px 4px;font-size:14px;text-align:center;font-family:ui-monospace,monospace;font-weight:800}
  .bcard .ormin:focus{outline:none;border-color:var(--gold)}
  .reftab{border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .refrow{display:flex;align-items:center;padding:9px 11px;font-size:12.5px;border-top:1px solid var(--line)}
  .refrow:first-child{border-top:none}
  .refrow .rn{font-weight:800;width:64px;color:var(--txt)}
  .refrow .rv{flex:1;text-align:right;color:var(--mut);font-family:ui-monospace,monospace}
  .refrow.on{background:rgba(243,179,74,.08)}
  .refrow.on .rn{color:var(--gold)}
  .dlab{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:0 0 5px}
  .plan{border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-top:12px}
  .prow{display:flex;align-items:center;gap:8px;padding:9px 11px;border-top:1px solid var(--line);font-size:13px}
  .prow:first-child{border-top:none}
  .prow .pp{font-weight:800;width:74px;flex:0 0 auto}
  .prow .pp em{font-style:normal;font-size:10px;background:var(--cyan);color:#04181a;border-radius:5px;padding:1px 5px;margin-left:3px;font-weight:800}
  .prow .pr2{flex:1;color:var(--mut);font-family:ui-monospace,monospace;font-size:12px}
  .prow .pw{display:flex;align-items:center;gap:4px;color:var(--mut);font-size:12px;flex:0 0 auto}
  .prow .planw{width:44px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:7px 4px;font-size:14px;text-align:center;font-family:ui-monospace,monospace;font-weight:800}
  .prow .planw:focus{outline:none;border-color:var(--cyan)}
  .prow.on{background:rgba(41,211,224,.07)}
  .prow.on .pp{color:var(--cyan)}
  .ptot{margin-top:11px;font-size:12px;color:var(--mut);font-family:ui-monospace,monospace;line-height:1.7}
  .voltbl{display:flex;flex-direction:column;gap:9px}
  .vrow{display:flex;align-items:center;gap:10px}
  .vrow .vm{width:58px;flex:0 0 auto;font-size:12.5px;font-weight:700;color:var(--txt)}
  .vrow .vbar{flex:1;height:9px;background:var(--bg2);border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .vrow .vfill{height:100%;background:var(--cyan);opacity:.55;border-radius:999px;transition:width .25s}
  .vrow .vfill.done{opacity:1}
  .vrow .vn{width:46px;flex:0 0 auto;text-align:right;font-size:13px;font-weight:800;color:var(--mut);font-family:ui-monospace,monospace}
  .vrow .vn.done{color:var(--cyan)}
  .vrow .vn i{color:var(--mut2);font-style:normal;font-weight:600;font-size:11px}
  .volnote{font-size:11px;color:var(--mut2);margin-top:9px;line-height:1.5}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .calhead button{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;width:42px;height:38px;font-size:20px;cursor:pointer;line-height:1}
  .calhead button:active{border-color:var(--cyan);color:var(--cyan)}
  .calhead .cm{font-weight:800;font-size:16px;letter-spacing:.02em}
  .calleg{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cwd{text-align:center;font-size:10px;color:var(--mut2);font-weight:700;padding-bottom:2px}
  .cell{min-height:50px;border:1px solid var(--line);border-radius:8px;padding:3px;display:flex;flex-direction:column;gap:2px;background:var(--card);cursor:pointer;overflow:hidden}
  .cell.blank{border:none;background:none;cursor:default;min-height:0}
  .cell.today{border-color:var(--cyan)}
  .cell.sel{background:var(--card2);border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset}
  .cell .dn{font-size:10px;color:var(--mut);font-weight:700;font-family:ui-monospace,monospace;line-height:1.2}
  .cell.today .dn{color:var(--cyan)}
  .cchip{font-size:8.5px;font-weight:800;border-radius:4px;padding:1px 3px;text-align:center;line-height:1.4;letter-spacing:.02em}
  .cchip.push{background:rgba(41,211,224,.18);color:var(--cyan)}
  .cchip.pull{background:rgba(155,140,240,.2);color:#b3a6f5}
  .cchip.leg{background:rgba(243,179,74,.18);color:var(--gold)}
  .cchip.other{background:var(--line);color:var(--mut)}

  .save{position:fixed;left:0;right:0;bottom:64px;z-index:20;pointer-events:none}
  .save .wrap{pointer-events:auto}
  .save button{width:100%;background:var(--cyan);color:#04181a;border:none;border-radius:12px;padding:15px;
    font-weight:800;font-size:15px;letter-spacing:.04em;cursor:pointer;box-shadow:0 8px 28px rgba(41,211,224,.22)}
  .save button:active{transform:translateY(1px)}

  .empty{text-align:center;color:var(--mut);padding:50px 20px;font-size:14px}
  .empty .big{font-size:15px;color:var(--txt);font-weight:700;margin-bottom:6px}

  .hcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:0;margin-bottom:10px;overflow:hidden}
  .htop{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;color:var(--txt);text-align:left;padding:13px;cursor:pointer;font-family:inherit}
  .htop:active{background:var(--card2)}
  .htop .htext{flex:1;min-width:0}
  .hcard .dname{font-weight:800;font-size:15px}
  .hcard .hdate{font-size:12px;color:var(--mut);font-family:ui-monospace,monospace;flex:0 0 auto}
  .hcard .hsum{font-size:12px;color:var(--mut);margin-top:5px}
  .htop .chev{color:var(--mut2);font-size:17px;line-height:1;transition:transform .15s;flex:0 0 auto}
  .htop.open .chev{transform:rotate(180deg)}
  .hbody{padding:0 13px;border-top:1px solid var(--line);display:none}
  .hbody.show{display:block;padding:11px 13px 13px}
  .hex{margin-bottom:9px}
  .hex .hn{font-weight:700;font-size:13.5px}
  .hex .hs{font-size:13px;color:var(--mut);font-family:ui-monospace,monospace;margin-top:2px}
  .hex .hs .b{color:var(--gold);font-weight:700}
  .hcond{background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px;color:var(--txt);margin-bottom:11px;white-space:pre-wrap;line-height:1.5}
  .delS{margin-top:8px;background:none;border:1px solid var(--line);color:var(--mut2);border-radius:8px;padding:7px 11px;font-size:11.5px;cursor:pointer}
  .delS:active{border-color:var(--red);color:var(--red)}

  .best{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .bcard{background:linear-gradient(180deg,var(--card2),var(--card));border:1px solid var(--gold-dim);border-radius:12px;padding:12px 10px;text-align:center}
  .bcard .bl{font-size:10px;letter-spacing:.1em;color:var(--mut);font-weight:700;text-transform:uppercase}
  .bcard .bv{font-size:21px;font-weight:800;color:var(--gold);margin-top:5px}
  .bcard .bv span{font-size:12px;color:var(--mut)}
  .bcard .bx{font-size:11px;color:var(--mut2);margin-top:2px}

  .drow{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:11px}
  .drow h3{margin:0 0 4px;font-size:14px;font-weight:800}
  .drow p{margin:0 0 11px;font-size:12.5px;color:var(--mut)}
  .drow input[type=date]{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:9px;padding:10px;font-size:15px;width:100%;font-family:inherit}
  .btn{display:inline-block;width:100%;text-align:center;border:1px solid var(--line);background:var(--card2);color:var(--txt);border-radius:10px;padding:12px;font-weight:700;font-size:14px;cursor:pointer}
  .btn.cyan{background:var(--cyan);color:#04181a;border-color:var(--cyan)}
  .btn.danger{color:var(--red);border-color:var(--gold-dim)}
  .btn:active{transform:translateY(1px)}
  .notice{background:var(--gold-dim);color:var(--gold);font-size:12px;border-radius:10px;padding:10px 12px;margin:12px 0;text-align:center}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(10,12,14,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  nav .inner{max-width:560px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
  nav button{background:none;border:none;color:var(--mut2);padding:11px 0 13px;font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer}
  nav button .ic{display:block;font-size:18px;margin-bottom:2px;line-height:1}
  nav button.on{color:var(--cyan)}

  /* ---------- events ---------- */
  var view=document.getElementById("view");

  view.addEventListener("input",function(ev){
    var t=ev.target;
    if(t.matches(".sets input")){ session.entries[+t.dataset.e].sets[+t.dataset.s][t.dataset.f]=t.value; }
    else if(t.classList&&t.classList.contains("ormin")){ settings.orm[t.dataset.orm]=t.value; saveSettings(settings); }
    else if(t.dataset.custom!==undefined){ session.entries[+t.dataset.custom].custom=t.value; }
    else if(t.id==="sessDate"){ session.date=t.value; }
    else if(t.id==="sessGym"){ session.gym=t.value; }
    else if(t.id==="sessCond"){ session.condition=t.value; }
    else if(t.id==="showDate"){ settings.showDate=t.value; saveSettings(settings); paintHeader(); }
  });

  view.addEventListener("change",function(ev){
    var t=ev.target;
    if(t.matches(".exsel")){ session.entries[+t.dataset.sel].sel=t.value; render(); return; }
    if(t.classList&&t.classList.contains("mgsel")){ session.entries[+t.dataset.mg].mg=t.value; return; }
    if(t.id==="sessTime"){ session.timeOfDay=t.value; return; }
    if(t.id==="startDate"){ settings.startDate=t.value; saveSettings(settings); render(); return; }
    if(t.id==="showDate"){ render(); return; }
    if(t.classList&&t.classList.contains("planw")){ var pi=+t.dataset.i, w=parseInt(t.value,10); if(isNaN(w)||w<0)w=0; if(w>52)w=52; settings.plan[pi].w=w; saveSettings(settings); render(); return; }
    if(t.id==="imp"){
      var f=t.files[0]; if(!f) return; var r=new FileReader();
      r.onload=function(){ try{ var data=JSON.parse(r.result); var arr=Array.isArray(data)?data:(data.logs||null);
          if(!arr) throw new Error("形式が違います");
          if(confirm("今の記録を置き換えます。よろしいですか？")){ saveLogs(arr); toast("読み込みました"); render(); }
        }catch(err){ alert("読み込めませんでした："+err.message); } t.value=""; };
      r.readAsText(f);
    }
  });

  view.addEventListener("click",function(ev){
    var t=ev.target.closest("button"); if(!t) return;
    if(t.dataset.day!==undefined){
      var k=t.dataset.day;
      if(session&&session.day!==k&&hasInput()&&!confirm("入力中の内容を破棄して切り替えますか？")) return;
      if(session&&session.day===k){ if((session._editIndex!=null||hasInput())&&!confirm("入力中の内容を破棄しますか？")) return; session=null; render(); return; }
      startSession(k); render(); return;
    }
    if(t.dataset.add!==undefined){ session.entries[+t.dataset.add].sets.push({w:"",r:""}); render(); return; }
    if(t.dataset.rmE!==undefined){ session.entries[+t.dataset.rmE].sets.splice(+t.dataset.rmS,1); render(); return; }
    if(t.dataset.rmcard!==undefined){
      var ix=+t.dataset.rmcard, sess=session, removed=session.entries.splice(ix,1)[0]; render();
      showUndo("種目を削除しました", function(){ if(session===sess){ sess.entries.splice(ix,0,removed); render(); } });
      return;
    }
    if(t.dataset.up!==undefined){ var u=+t.dataset.up; if(u>0){ var a=session.entries,tmp=a[u]; a[u]=a[u-1]; a[u-1]=tmp; render(); } return; }
    if(t.dataset.down!==undefined){ var d=+t.dataset.down,a2=session.entries; if(d<a2.length-1){ var tmp2=a2[d]; a2[d]=a2[d+1]; a2[d+1]=tmp2; render(); } return; }
    if(t.id==="cancelEdit"){ session=null; gotoTab("hist"); return; }
    if(t.id==="addEx"){ session.entries.push({t:"",big3:false,variants:EX_LIBRARY,sel:"other",custom:"",mg:"",sets:[{w:"",r:""}]}); render();
      window.scrollTo(0,document.body.scrollHeight); return; }
    if(t.dataset.cal!==undefined){ if(!calRef){var t0=todayISO();calRef=new Date(+t0.slice(0,4),+t0.slice(5,7)-1,1);} calRef.setMonth(calRef.getMonth()+(t.dataset.cal==="next"?1:-1)); calSel=null; render(); return; }
    if(t.dataset.calday!==undefined){ calSel=(calSel===t.dataset.calday)?null:t.dataset.calday; render(); return; }
    if(t.dataset.fil!==undefined){ histFilter=t.dataset.fil; render(); return; }
    if(t.dataset.volmode!==undefined){ settings.volMode=t.dataset.volmode; saveSettings(settings); render(); return; }
    if(t.dataset.edit!==undefined){ startEdit(+t.dataset.edit); return; }
    if(t.dataset.h!==undefined){ document.getElementById("hb"+t.dataset.h).classList.toggle("show"); t.classList.toggle("open"); return; }
    if(t.dataset.del!==undefined){ var di=+t.dataset.del, a=loadLogs(), removedLog=a.splice(di,1)[0]; saveLogs(a); render();
      showUndo("記録を削除しました", function(){ var b=loadLogs(); b.splice(di,0,removedLog); saveLogs(b); render(); }); return; }
    if(t.id==="syncPhase"){ var s=planSchedule(); if(s.curIdx>=0){ var pidx=PHASES.indexOf(settings.plan[s.curIdx].p); if(pidx>=0){ settings.phase=pidx; saveSettings(settings); paintHeader(); toast("フェーズを"+settings.plan[s.curIdx].p+"に設定"); } } else { toast("今日は計画期間外です"); } return; }
    if(t.id==="exp"){ exportJSON(); return; }
    if(t.id==="impBtn"){ document.getElementById("imp").click(); return; }
    if(t.id==="clr"){ if(confirm("本当にすべて削除しますか？")){ var prev=loadLogs(); saveLogs([]); render();
      showUndo("全データを削除しました", function(){ saveLogs(prev); render(); }); } return; }
  });

  function hasInput(){ return session&&session.entries.some(function(e){return e.sets.some(function(s){return s.w!==""||s.r!=="";});}); }
  function startSession(k){ session={day:k,date:todayISO(),gym:"",timeOfDay:"",condition:"",entries:PROGRAM[k].ex.map(function(x){return {tp:x.tp,b3:x.b3,big3:!!x.big3,variants:x.variants.slice(),sel:"0",custom:"",mg:"",sets:[{w:"",r:""}]};})}; }
  function startEdit(i){
    var l=loadLogs()[i]; if(!l) return;
    session={ day:l.day, date:l.date||todayISO(), gym:l.gym||"", timeOfDay:l.timeOfDay||"", condition:l.condition||"", _editIndex:i,
      entries:(l.entries||[]).map(function(e){
        var idx=EX_LIBRARY.indexOf(e.n);
        return { t:"", big3:!!e.big3, variants:EX_LIBRARY, sel:(idx>=0?String(idx):"other"), custom:(idx>=0?"":e.n), mg:(e.mg||""),
          sets:(e.sets||[]).map(function(s){return {w:s.w,r:s.r};}) };
      }) };
    if(!session.entries.length) session.entries.push({t:"",big3:false,variants:EX_LIBRARY,sel:"other",custom:"",mg:"",sets:[{w:"",r:""}]});
    gotoTab("log");
  }

  function exportJSON(){
    var blob=new Blob([JSON.stringify(loadLogs(),null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob),a=document.createElement("a");
    a.href=url; a.download="physique2027_backup_"+todayISO().replace(/-/g,"")+".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},500); toast("書き出しました");
  }

  document.getElementById("saveBtn").addEventListener("click",function(){
    if(!session) return;
    var clean={day:session.day,date:session.date,gym:session.gym,timeOfDay:session.timeOfDay,condition:session.condition,entries:[]};
    session.entries.forEach(function(e){
      var name=resolveName(e); if(!name) return;
      var sets=e.sets.filter(function(s){return s.w!==""||s.r!=="";});
      if(sets.length){ var ent={n:name,big3:!!e.big3,sets:sets}; if(e.mg) ent.mg=e.mg; clean.entries.push(ent); }
    });
    if(!clean.entries.length){ toast("数字を入力してね"); return; }
    var logs=loadLogs();
    if(session._editIndex!=null && logs[session._editIndex]){ logs[session._editIndex]=clean; saveLogs(logs); session=null; toast("更新しました ✓"); gotoTab("hist"); return; }
    logs.push(clean); saveLogs(logs); session=null; toast("保存しました ✓"); render();
  });

  function gotoTab(name){ tab=name;
    Array.prototype.forEach.call(document.querySelectorAll("nav button"),function(x){x.classList.toggle("on",x.dataset.tab===name);});
    window.scrollTo(0,0); render(); }
  Array.prototype.forEach.call(document.querySelectorAll("nav button"),function(b){
    b.addEventListener("click",function(){ gotoTab(b.dataset.tab); });
  });

  paintHeader(); render();
})();
</script>
</body>
</html>
