<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="MyGym">
  <meta name="theme-color" content="#f4f5f8">
  <title>MyGym</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #f4f5f8; color: #1d2029; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; overscroll-behavior: none; }
    #root { height: 100dvh; } body { padding-top: env(safe-area-inset-top, 0); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
const { useState, useEffect } = React;

const CLIENT_COLORS = [
  { id: "yellow", label: "イエロー", hex: "#ca8a04" },
  { id: "blue",   label: "ブルー",   hex: "#2563eb" },
  { id: "green",  label: "グリーン", hex: "#0e9f5a" },
  { id: "orange", label: "オレンジ", hex: "#ea580c" },
  { id: "pink",   label: "ピンク",   hex: "#db2777" },
  { id: "purple", label: "パープル", hex: "#9333ea" },
  { id: "red",    label: "レッド",   hex: "#dc2626" },
  { id: "teal",   label: "ティール", hex: "#0d9488" },
];
const getColor = (colorId) => CLIENT_COLORS.find(c => c.id === colorId) || CLIENT_COLORS[0];
const GYM_OPTIONS = [
  { id: "fit-easy", label: "フィットイージー", colorId: "yellow" },
  { id: "anytime",  label: "エニタイム",       colorId: "purple" },
  { id: "other",    label: "その他 / 指定なし", colorId: null },
];
const parseCSV = (text) => {
  const rows = []; let row = [], cur = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur = ""; }
      else if (ch === '\n') { row.push(cur); rows.push(row); row = []; cur = ""; }
      else if (ch === '\r') {}
      else cur += ch;
    }
  }
  if (cur !== "" || row.length) { row.push(cur); rows.push(row); }
  return rows.filter(r => r.some(c => c.trim() !== ""));
};
const TODAY = new Date().toISOString().split("T")[0];
const isExpired = (expiry) => expiry && new Date(expiry) < new Date();
const groupByMonth = (recs) => {
  const map = {};
  recs.forEach(r => { const k = r.date.slice(0,7); if (!map[k]) map[k]=[]; map[k].push(r); });
  return Object.entries(map).sort((a,b) => b[0].localeCompare(a[0]));
};
const fmtMonth = (k) => { const [y,m] = k.split("-"); return `${y}年${parseInt(m)}月`; };

const SAVE_KEY = "mygym_data_v1";
const loadSaved = () => {
  try {
    // localStorage と sessionStorage 両方試す
    const r = localStorage.getItem(SAVE_KEY) || sessionStorage.getItem(SAVE_KEY);
    return r ? JSON.parse(r) : null;
  } catch { return null; }
};
const persistSave = (data) => {
  const json = JSON.stringify(data);
  try { localStorage.setItem(SAVE_KEY, json); } catch(e) {}
  try { sessionStorage.setItem(SAVE_KEY, json); } catch(e) {}
};
const loadFromHash = () => { return null; };

const initialClients = [];
const initialTickets = {};
const initialRecords = {};
const initialProfiles = {};

function App() {
  const saved = loadFromHash() || loadSaved();
  const [clients, setClients] = useState(saved?.clients ?? initialClients);
  const [tickets, setTickets] = useState(saved?.tickets ?? initialTickets);
  const [records, setRecords] = useState(saved?.records ?? initialRecords);
  const [profiles, setProfiles] = useState(saved?.profiles ?? initialProfiles);
  const [bodyComps, setBodyComps] = useState(saved?.bodyComps ?? {});
  const [clientNotes, setClientNotes] = useState(saved?.clientNotes ?? {});
  const [newNoteText, setNewNoteText] = useState("");
  const [colorFilter, setColorFilter] = useState(null);
  const [formConfig, setFormConfig] = useState(saved?.formConfig ?? { csvUrl:"", mapping:{name:"",age:"",birthday:"",job:"",goal:""}, importedKeys:[] });
  const [showFormSync, setShowFormSync] = useState(false);
  const [formHeaders, setFormHeaders] = useState(null);
  const [formRows, setFormRows] = useState([]);
  const [formLoading, setFormLoading] = useState(false);
  const [confirmDeleteNote, setConfirmDeleteNote] = useState(null);
  const [selectedClient, setSelectedClient] = useState(null);
  const [tab, setTab] = useState("record");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [isWide, setIsWide] = useState(window.innerWidth >= 768);
  const [collapsedMonths, setCollapsedMonths] = useState({});
  const [collapsedRecords, setCollapsedRecords] = useState({});
  const [clientSearch, setClientSearch] = useState("");
  const [saveStatus, setSaveStatus] = useState("");
  const [showBackup, setShowBackup] = useState(false);

  const [showAddClient, setShowAddClient] = useState(false);
  const [showAddRecord, setShowAddRecord] = useState(false);
  const [showAddTicket, setShowAddTicket] = useState(false);
  const [showAddBodyComp, setShowAddBodyComp] = useState(false);
  const [editingRecord, setEditingRecord] = useState(null);
  const [editingBodyComp, setEditingBodyComp] = useState(null);
  const [editingProfile, setEditingProfile] = useState(false);
  const [confirmDeleteRecord, setConfirmDeleteRecord] = useState(null);
  const [confirmDeleteClient, setConfirmDeleteClient] = useState(null);
  const [confirmDeleteTicket, setConfirmDeleteTicket] = useState(null);
  const [confirmDeleteBodyComp, setConfirmDeleteBodyComp] = useState(null);

  const [newClient, setNewClient] = useState({ name:"", age:"", goal:"", birthday:"", job:"", gym:"fit-easy", colorId:"yellow" });
  const [newRecord, setNewRecord] = useState({ date: TODAY, ticketId: null, exercises:[{name:"",weight:"",reps:"",sets:"",memo:""}] });
  const [newTicket, setNewTicket] = useState({ price:"", total:"", expiry:"" });
  const [newBodyComp, setNewBodyComp] = useState({ date: TODAY, bodyWeight:"", bodyFat:"", muscleMass:"", waist:"" });
  const [profileForm, setProfileForm] = useState({ rom:"", injuries:"", condition:"", supplements:"", medications:"" });
  const [basicForm, setBasicForm] = useState({ name:"", age:"", birthday:"", job:"", goal:"", gym:"other", colorId:"yellow" });

  useEffect(() => {
    const h = () => setIsWide(window.innerWidth >= 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);

  // 自動保存：データが変わるたびに自動保存
  useEffect(() => {
    try {
      persistSave({ clients, tickets, records, profiles, bodyComps, clientNotes, formConfig });
      setSaveStatus("saved");
      const t = setTimeout(() => setSaveStatus(""), 1500);
      return () => clearTimeout(t);
    } catch {
      setSaveStatus("error");
    }
  }, [clients, tickets, records, profiles, bodyComps, clientNotes, formConfig]);

  const backupData = () => {
    const data = JSON.stringify({ clients, tickets, records, profiles, bodyComps, clientNotes, formConfig }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mygym_backup_${TODAY}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const restoreData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.clients) setClients(data.clients);
        if (data.bodyComps) setBodyComps(data.bodyComps);
        if (data.clientNotes) setClientNotes(data.clientNotes);
        if (data.formConfig) setFormConfig(data.formConfig);
        if (data.tickets) setTickets(data.tickets);
        if (data.records) setRecords(data.records);
        if (data.profiles) setProfiles(data.profiles);
        setShowBackup(false);
        alert("復元しました！");
      } catch { alert("ファイルが正しくありません"); }
    };
    reader.readAsText(file);
  };

  const saveData = () => {
    try {
      persistSave({ clients, tickets, records, profiles, bodyComps, clientNotes, formConfig });
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus(""), 2000);
    } catch {
      setSaveStatus("error");
      setTimeout(() => setSaveStatus(""), 2000);
    }
  };

  const accentColor = selectedClient ? getColor(selectedClient.colorId).hex : "#ca8a04";
  const selectClient = (c) => { setSelectedClient(c); setTab("record"); if (!isWide) setSidebarOpen(false); };
  const colorOrder = CLIENT_COLORS.map(c=>c.id);
  const filteredClients = clients.filter(c =>
    (c.name.toLowerCase().includes(clientSearch.toLowerCase()) || (c.goal||"").includes(clientSearch))
    && (!colorFilter || (c.colorId||"yellow")===colorFilter)
  ).slice().sort((a,b)=>colorOrder.indexOf(a.colorId||"yellow")-colorOrder.indexOf(b.colorId||"yellow"));

  const addClient = () => {
    if (!newClient.name) return;
    const id = Date.now();
    setClients([...clients, { id, ...newClient, age: Number(newClient.age) }]);
    setTickets({ ...tickets, [id]: [] });
    setRecords({ ...records, [id]: [] });
    setProfiles({ ...profiles, [id]: { rom:"", injuries:"", condition:"", supplements:"", medications:"" } });
    setNewClient({ name:"", age:"", goal:"", birthday:"", job:"", gym:"fit-easy", colorId:"yellow" });
    setShowAddClient(false);
  };
  const doDeleteClient = () => {
    if (!confirmDeleteClient) return;
    const id = confirmDeleteClient.id;
    setClients(clients.filter(c => c.id !== id));
    if (selectedClient?.id === id) setSelectedClient(null);
    setConfirmDeleteClient(null);
  };

  const syncTicketLog = (currentTickets, cid, oldTicketId, newTicketId, recordDate) => {
    return currentTickets[cid].map(t => {
      if (t.id === oldTicketId && oldTicketId !== newTicketId) {
        const idx = [...t.usedLog].lastIndexOf(recordDate);
        const log = idx >= 0 ? [...t.usedLog.slice(0,idx), ...t.usedLog.slice(idx+1)] : t.usedLog.slice(0,-1);
        return { ...t, usedLog: log };
      }
      if (t.id === newTicketId && oldTicketId !== newTicketId) return { ...t, usedLog: [...t.usedLog, recordDate] };
      if (t.id === newTicketId && oldTicketId === newTicketId && oldTicketId !== null) {
        const idx = t.usedLog.indexOf(editingRecord?.date);
        const log = idx >= 0 ? [...t.usedLog.slice(0,idx), recordDate, ...t.usedLog.slice(idx+1)] : t.usedLog;
        return { ...t, usedLog: log };
      }
      return t;
    });
  };

  const saveRecord = () => {
    if (!selectedClient) return;
    const cid = selectedClient.id;
    const list = records[cid] || [];
    const rec = { ...newRecord, ticketId: newRecord.ticketId || null, memo: newRecord.memo || "" };
    const oldTicketId = editingRecord ? (editingRecord.ticketId || null) : null;
    const newTicketId = rec.ticketId;
    let updatedTickets = { ...tickets };
    if (editingRecord) {
      updatedTickets = { ...tickets, [cid]: syncTicketLog(tickets, cid, oldTicketId, newTicketId, rec.date) };
    } else if (newTicketId) {
      updatedTickets = { ...tickets, [cid]: tickets[cid].map(t => t.id === newTicketId ? { ...t, usedLog: [...t.usedLog, rec.date] } : t) };
    }
    setTickets(updatedTickets);
    if (editingRecord) {
      setRecords({ ...records, [cid]: list.map(r => r.id === editingRecord.id ? { ...r, ...rec } : r) });
    } else {
      setRecords({ ...records, [cid]: [{ id: Date.now(), ...rec }, ...list] });
    }
    setNewRecord({ date: TODAY, ticketId: null, memo: "", exercises:[{name:"",weight:"",reps:"",sets:"",memo:""}] });
    setEditingRecord(null);
    setShowAddRecord(false);
  };
  const openEditRecord = (r) => { setEditingRecord(r); setNewRecord({ date: r.date, ticketId: r.ticketId||null, memo: r.memo||"",
    exercises: r.exercises.map(e=>({...e})) }); setShowAddRecord(true); };
  const doDeleteRecord = () => {
    if (confirmDeleteRecord === null) return;
    const cid = selectedClient.id;
    const rec = records[cid].find(r => r.id === confirmDeleteRecord);
    if (rec?.ticketId) {
      const updatedTickets = { ...tickets, [cid]: tickets[cid].map(t => {
        if (t.id !== rec.ticketId) return t;
        const idx = t.usedLog.indexOf(rec.date);
        const log = idx >= 0 ? [...t.usedLog.slice(0,idx), ...t.usedLog.slice(idx+1)] : t.usedLog.slice(0,-1);
        return { ...t, usedLog: log };
      })};
      setTickets(updatedTickets);
    }
    setRecords({ ...records, [cid]: records[cid].filter(r => r.id !== confirmDeleteRecord) });
    setConfirmDeleteRecord(null);
  };
  const saveBodyComp = () => {
    if (!selectedClient) return;
    const cid = selectedClient.id;
    const list = bodyComps[cid] || [];
    const entry = { date: newBodyComp.date, bodyWeight: newBodyComp.bodyWeight||"", bodyFat: newBodyComp.bodyFat||"", muscleMass: newBodyComp.muscleMass||"", waist: newBodyComp.waist||"" };
    if (editingBodyComp) {
      setBodyComps({ ...bodyComps, [cid]: list.map(b => b.id === editingBodyComp.id ? { ...b, ...entry } : b) });
    } else {
      setBodyComps({ ...bodyComps, [cid]: [{ id: Date.now(), ...entry }, ...list] });
    }
    setNewBodyComp({ date: TODAY, bodyWeight:"", bodyFat:"", muscleMass:"", waist:"" });
    setEditingBodyComp(null);
    setShowAddBodyComp(false);
  };
  const openEditBodyComp = (b) => { setEditingBodyComp(b); setNewBodyComp({ date: b.date, bodyWeight: b.bodyWeight||"", bodyFat: b.bodyFat||"", muscleMass: b.muscleMass||"", waist: b.waist||"" }); setShowAddBodyComp(true); };
  const doDeleteBodyComp = () => {
    if (confirmDeleteBodyComp === null) return;
    const cid = selectedClient.id;
    setBodyComps({ ...bodyComps, [cid]: (bodyComps[cid]||[]).filter(b => b.id !== confirmDeleteBodyComp) });
    setConfirmDeleteBodyComp(null);
  };
  const addNote = () => {
    if (!newNoteText.trim() || !selectedClient) return;
    const cid = selectedClient.id;
    setClientNotes({ ...clientNotes, [cid]: [{ id: Date.now(), date: TODAY, text: newNoteText.trim() }, ...(clientNotes[cid]||[])] });
    setNewNoteText("");
  };
  const doDeleteNote = () => {
    if (confirmDeleteNote === null) return;
    const cid = selectedClient.id;
    setClientNotes({ ...clientNotes, [cid]: (clientNotes[cid]||[]).filter(n => n.id !== confirmDeleteNote) });
    setConfirmDeleteNote(null);
  };
  const loadFormCSV = async () => {
    if (!formConfig.csvUrl.trim()) { alert("URLを入力してください"); return; }
    setFormLoading(true);
    try {
      const res = await fetch(formConfig.csvUrl.trim());
      if (!res.ok) throw new Error("fetch failed");
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 1) { alert("データが見つかりません"); setFormLoading(false); return; }
      setFormHeaders(rows[0]);
      setFormRows(rows.slice(1));
    } catch (e) {
      alert("読み込みに失敗しました。URLが「ウェブに公開」したCSVのURLか確認してください。");
    }
    setFormLoading(false);
  };
  const importFormClients = () => {
    const m = formConfig.mapping;
    if (!m.name) { alert("氏名の列を選択してください"); return; }
    const hIdx = (h) => formHeaders.indexOf(h);
    const nameI = hIdx(m.name), ageI = m.age?hIdx(m.age):-1, bdI = m.birthday?hIdx(m.birthday):-1, jobI = m.job?hIdx(m.job):-1, goalI = m.goal?hIdx(m.goal):-1;
    const existingKeys = new Set(formConfig.importedKeys||[]);
    const newClients = [];
    const newKeys = [];
    formRows.forEach((row,ri)=>{
      const name = (row[nameI]||"").trim();
      if (!name) return;
      const key = `${row[0]||ri}|${name}`;
      if (existingKeys.has(key)) return;
      newClients.push({
        id: Date.now()+ri,
        name,
        age: ageI>=0 ? Number(row[ageI])||0 : 0,
        birthday: bdI>=0 ? (row[bdI]||"").trim() : "",
        job: jobI>=0 ? (row[jobI]||"").trim() : "",
        goal: goalI>=0 ? (row[goalI]||"").trim() : "",
        colorId: "yellow",
      });
      newKeys.push(key);
    });
    if (newClients.length===0) { alert("新しい回答はありません（取り込み済み）"); return; }
    setClients([...clients, ...newClients]);
    const tk = {...tickets}, rc = {...records}, pf = {...profiles};
    newClients.forEach(c=>{ tk[c.id]=[]; rc[c.id]=[]; pf[c.id]={ rom:"", injuries:"", condition:"", supplements:"", medications:"" }; });
    setTickets(tk); setRecords(rc); setProfiles(pf);
    setFormConfig({ ...formConfig, importedKeys: [...(formConfig.importedKeys||[]), ...newKeys] });
    alert(`${newClients.length}名のクライアントを追加しました！`);
    setShowFormSync(false);
  };
  const addExerciseRow = () => setNewRecord({ ...newRecord, exercises: [...newRecord.exercises, {name:"",weight:"",reps:"",sets:"",memo:""}] });
  const removeExerciseRow = (i) => { if (newRecord.exercises.length === 1) return; setNewRecord({ ...newRecord, exercises: newRecord.exercises.filter((_,idx)=>idx!==i) }); };
  const duplicateExercise = (i) => {
    const ex = newRecord.exercises[i];
    const copy = { name: ex.name, weight: "", reps: "", sets: "", memo: "" };
    const newExs = [...newRecord.exercises.slice(0, i+1), copy, ...newRecord.exercises.slice(i+1)];
    setNewRecord({ ...newRecord, exercises: newExs });
  };
  const updateExercise = (i, field, value) => setNewRecord({ ...newRecord, exercises: newRecord.exercises.map((ex,idx)=>idx===i?{...ex,[field]:value}:ex) });
  const adjustField = (recordId, exIdx, field, delta) => {
    setRecords({ ...records, [selectedClient.id]: records[selectedClient.id].map(r =>
      r.id===recordId ? { ...r, exercises: r.exercises.map((ex,i)=>i===exIdx?{...ex,[field]:Math.max(0,Number(ex[field])+delta)}:ex) } : r
    )});
  };

  const addTicket = () => {
    if (!selectedClient || !newTicket.price || !newTicket.total) return;
    const id = Date.now();
    setTickets({ ...tickets, [selectedClient.id]: [...(tickets[selectedClient.id]||[]), { id, price:Number(newTicket.price), total:Number(newTicket.total), usedLog:[], expiry:newTicket.expiry }] });
    setNewTicket({ price:"", total:"", expiry:"" });
    setShowAddTicket(false);
  };
  const useTicket = (t) => {
    if (t.total - t.usedLog.length <= 0 || isExpired(t.expiry)) return;
    // このチケットを使ったトレーニング記録の日付でまだ未消化のものがあればその日付を使う
    const recDates = (records[selectedClient.id]||[]).filter(r=>r.ticketId===t.id).map(r=>r.date).sort();
    const logCopy = [...t.usedLog];
    let dateToUse = TODAY;
    for (const d of recDates) {
      const di = logCopy.indexOf(d);
      if (di >= 0) { logCopy.splice(di,1); } else { dateToUse = d; break; }
    }
    setTickets({ ...tickets, [selectedClient.id]: tickets[selectedClient.id].map(tk => tk.id===t.id ? { ...tk, usedLog: [...tk.usedLog, dateToUse].sort() } : tk) });
  };
  const undoTicket = (t) => {
    if (t.usedLog.length === 0) return;
    setTickets({ ...tickets, [selectedClient.id]: tickets[selectedClient.id].map(tk => tk.id===t.id ? { ...tk, usedLog: tk.usedLog.slice(0,-1) } : tk) });
  };
  const doDeleteTicket = () => {
    if (!confirmDeleteTicket) return;
    setTickets({ ...tickets, [selectedClient.id]: tickets[selectedClient.id].filter(t => t.id !== confirmDeleteTicket) });
    setConfirmDeleteTicket(null);
  };

  const openEditHealth = () => { const p=profiles[selectedClient.id]||{}; setProfileForm({rom:p.rom||"",injuries:p.injuries||"",condition:p.condition||"",supplements:p.supplements||"",medications:p.medications||""}); setEditingProfile("health"); };
  const openEditBasic = () => { setBasicForm({name:selectedClient.name,age:selectedClient.age,birthday:selectedClient.birthday||"",job:selectedClient.job||"",goal:selectedClient.goal||"",gym:selectedClient.gym||"other",colorId:selectedClient.colorId||"yellow"}); setEditingProfile("basic"); };
  const saveProfile = () => { setProfiles({...profiles,[selectedClient.id]:{...profileForm}}); setEditingProfile(false); };
  const saveBasic = () => { const u={...selectedClient,...basicForm,age:Number(basicForm.age)}; setClients(clients.map(c=>c.id===selectedClient.id?u:c)); setSelectedClient(u); setEditingProfile(false); };
  const toggleMonth = (k) => setCollapsedMonths(prev=>({...prev,[k]:!prev[k]}));
  const toggleRecord = (id) => setCollapsedRecords(prev=>({...prev,[id]:!prev[id]}));

  const clientRecords = selectedClient ? (records[selectedClient.id]||[]) : [];
  const clientTickets = selectedClient ? (tickets[selectedClient.id]||[]) : [];
  const clientProfile = selectedClient ? (profiles[selectedClient.id]||{}) : {};
  const monthGroups = groupByMonth(clientRecords);
  const clientBodyComps = selectedClient ? (bodyComps[selectedClient.id]||[]) : [];
  const bodyCompData = [...clientBodyComps].sort((a,b)=>a.date.localeCompare(b.date));
  const tabs = [{key:"record",label:"トレーニング"},{key:"ticket",label:"チケット"},{key:"body",label:"体組成"},{key:"profile",label:"基本情報"},{key:"notes",label:"メモ"}];

  return (
    <div style={{fontFamily:"'Hiragino Sans','Noto Sans JP',sans-serif",display:"flex",height:"100dvh",background:"#f4f5f8",color:"#1d2029",position:"relative",overflow:"hidden"}}>
      {!isWide && sidebarOpen && <div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:40}}/>}

      {sidebarOpen && (
        <div style={{width:isWide?240:280,background:"#ffffff",borderRight:"1px solid #d9dce5",display:"flex",flexDirection:"column",position:isWide?"relative":"fixed",top:0,left:0,height:"100%",zIndex:isWide?"auto":50}}>
          <div style={{padding:"20px 16px 14px",borderBottom:"1px solid #d9dce5",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontSize:10,letterSpacing:3,color:"#6b7080",textTransform:"uppercase",marginBottom:3}}>Trainer</div><div style={{fontSize:20,fontWeight:700,color:"#ca8a04"}}>MyGym</div></div>
            {!isWide && <button onClick={()=>setSidebarOpen(false)} style={{background:"none",border:"none",color:"#6b7080",fontSize:22,cursor:"pointer"}}>✕</button>}

function BodyLineChart({data, color}){
  if (!data || data.length < 2) return null;
  const w = 600, h = 160, pad = 30;
  const values = data.map(d=>d.y);
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || 1;
  const yTo = (v) => h - pad - ((v - min) / range) * (h - pad*2);
  const xTo = (i) => pad + (i / (data.length - 1)) * (w - pad*2);
  const points = data.map((d,i)=>`${xTo(i)},${yTo(d.y)}`).join(" ");
  return (
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",minWidth:300,height:"auto"}} preserveAspectRatio="xMidYMid meet">
        <line x1={pad} y1={h-pad} x2={w-pad} y2={h-pad} stroke="#d9dce5" strokeWidth="1"/>
        <line x1={pad} y1={pad/2} x2={pad} y2={h-pad} stroke="#d9dce5" strokeWidth="1"/>
        <text x={pad-4} y={yTo(max)+4} fill="#8a8f9c" fontSize="10" textAnchor="end">{max}</text>
        <text x={pad-4} y={yTo(min)+4} fill="#8a8f9c" fontSize="10" textAnchor="end">{min}</text>
        <polyline points={points} fill="none" stroke={color} strokeWidth="2"/>
        {data.map((d,i)=>(
          <circle key={i} cx={xTo(i)} cy={yTo(d.y)} r="3" fill={color}/>
        ))}
        <text x={pad} y={h-6} fill="#8a8f9c" fontSize="10" textAnchor="start">{data[0].x.slice(5)}</text>
        <text x={w-pad} y={h-6} fill="#8a8f9c" fontSize="10" textAnchor="end">{data[data.length-1].x.slice(5)}</text>
      </svg>
    </div>
  );
}

}
function ConfirmModal({emoji,title,sub,onCancel,onConfirm,confirmLabel,danger}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}><div style={{background:"#ffffff",border:`1px solid ${danger?"#eec7c7":"#d9dce5"}`,borderRadius:16,padding:28,width:"100%",maxWidth:340,textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>{emoji}</div><div style={{fontWeight:700,fontSize:15,marginBottom:6}}>{title}</div>{sub&&<div style={{fontSize:12,color:"#6b7080",marginBottom:24}}>{sub}</div>}<div style={{display:"flex",gap:10}}><button onClick={onCancel} style={{flex:1,padding:"10px 0",background:"#d9dce5",color:"#565b68",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>キャンセル</button><button onClick={onConfirm} style={{flex:1,padding:"10px 0",background:danger?"#b02a2a":"#ca8a04",color:danger?"#fff":"#f4f5f8",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer"}}>{confirmLabel}</button></div></div></div>;
}
function Section({title,accent,children}){
  return <div style={{background:"#ffffff",border:"1px solid #d9dce5",borderRadius:12,overflow:"hidden"}}><div style={{padding:"10px 16px",background:"#eef0f5",borderBottom:"1px solid #d9dce5",fontSize:12,fontWeight:700,color:accent||"#ca8a04",letterSpacing:1}}>{title}</div><div style={{padding:"4px 0"}}>{children}</div></div>;
}
function InfoRow({label,value,dot}){
  return <div style={{display:"flex",padding:"10px 16px",borderBottom:"1px solid #e6e8ef",gap:12,alignItems:"center"}}><div style={{fontSize:12,color:"#6b7080",minWidth:100,flexShrink:0}}>{label}</div><div style={{fontSize:14,color:"#1d2029",whiteSpace:"pre-wrap",wordBreak:"break-all",display:"flex",alignItems:"center",gap:8}}>{dot&&<span style={{width:10,height:10,borderRadius:"50%",background:dot,display:"inline-block",flexShrink:0}}/>}{value}</div></div>;
}
function Modal({title,onClose,children}){
  useEffect(()=>{
    const prev = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    return ()=>{ document.body.style.overflow = prev; };
  },[]);
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"flex-start",justifyContent:"center",zIndex:100,padding:16,overflowY:"auto",WebkitOverflowScrolling:"touch"}}><div style={{background:"#ffffff",border:"1px solid #d9dce5",borderRadius:16,padding:24,width:"100%",maxWidth:480,marginTop:12,marginBottom:60}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div style={{fontWeight:700,fontSize:16}}>{title}</div><button onClick={onClose} style={{background:"none",border:"none",color:"#6b7080",fontSize:22,cursor:"pointer"}}>✕</button></div>{children}</div></div>;
}
function Label({children}){return <div style={{fontSize:12,color:"#6b7080",marginBottom:6}}>{children}</div>;}
function Input(props){return <input {...props} style={{width:"100%",padding:"9px 12px",background:"#f4f5f8",border:"1px solid #d9dce5",borderRadius:8,color:"#1d2029",fontSize:16,marginBottom:14,boxSizing:"border-box",outline:"none"}}/>;}
function Textarea(props){return <textarea {...props} rows={3} style={{width:"100%",padding:"9px 12px",background:"#f4f5f8",border:"1px solid #d9dce5",borderRadius:8,color:"#1d2029",fontSize:16,marginBottom:14,boxSizing:"border-box",outline:"none",resize:"vertical",fontFamily:"inherit"}}/>;}
function SubmitBtn({onClick,children,accent}){const ac=accent||"#ca8a04";return <button onClick={onClick} style={{width:"100%",padding:"11px 0",background:ac,color:"#f4f5f8",border:"none",borderRadius:8,fontWeight:700,fontSize:14,cursor:"pointer",marginTop:4}}>{children}</button>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
